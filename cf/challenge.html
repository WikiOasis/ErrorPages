<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="https://cdn.wikioasis.org/images/metawiki/1/18/favicon.ico" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Security Checkpoint • WikiOasis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10%;
            background: #1a1f2e;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            animation: fade 8s ease-in-out infinite, float 15s ease-in-out infinite;
            will-change: transform, opacity;
        }

        @keyframes fade {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 0.6; }
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translate(0, 0); }
            25%       { transform: translate(-50%, -50%) translate(30px, -20px); }
            50%       { transform: translate(-50%, -50%) translate(-20px, 30px); }
            75%       { transform: translate(-50%, -50%) translate(20px, 20px); }
        }

        .container {
            display: flex;
            align-items: center;
            position: relative;
            z-index: 1;
            gap: 24px;
        }

        .challenge-box {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 48px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-shrink: 0;
            position: relative;
            min-width: 80px;
            min-height: 80px;
        }

        .challenge-spinner {
            position: absolute;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(91, 164, 212, 0.9);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .challenge-spinner.hidden {
            opacity: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .logo {
            width: 240px;
            height: auto;
            flex-shrink: 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin-bottom: 2px;
        }

        .url {
            font-size: 13px;
            color: #5ba4d4;
            margin-bottom: 2px;
        }

        .description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
        }

        .buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            body {
                padding: 20px;
                justify-content: center;
            }

            .container {
                flex-direction: column;
                text-align: center;
            }

            .buttons {
                justify-content: center;
            }

            .challenge-box {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
    <link rel="shortcut icon" href="https://cdn.wikioasis.org/metawiki/1/18/favicon.ico" />
</head>
<body>

<div class="container">
    <img class="logo" src="https://cdn.wikioasis.org/metawiki/3/38/WikiOasis_Logo.png" alt="WikiOasis Logo" />
    <div class="content">
        <h1>Security Checkpoint</h1>
        <p class="url" id="page-url"></p>
        <p class="description">Verifying your connection to WikiOasis. This usually only takes a moment.</p>
        <div class="buttons">
            <a href="https://status.wikioasis.org/" class="btn">Status Page</a>
            <a href="https://discord.gg/GrrTcsVC2x" class="btn">Discord</a>
        </div>
    </div>
    <div class="challenge-box" id="challenge-box">
        <div class="challenge-spinner" id="challenge-spinner"></div>
        ::CAPTCHA_BOX::
    </div>
</div>

<script>
    document.getElementById('page-url').textContent = window.location.host + window.location.pathname + window.location.search + window.location.hash;

    (function() {
        const box = document.getElementById('challenge-box');
        const spinner = document.getElementById('challenge-spinner');

        const observer = new MutationObserver(function() {
            const hasWidget = Array.from(box.children).some(function(el) {
                return el !== spinner && (el.tagName === 'IFRAME' || el.children.length > 0);
            });
            if (hasWidget) {
                spinner.classList.add('hidden');
                setTimeout(function() { spinner.remove(); }, 300);
                observer.disconnect();
            }
        });

        observer.observe(box, { childList: true, subtree: true });
    })();
</script>

<script>
    (function() {
        const colors = [
            'rgba(64, 224, 208, 0.25)',
            'rgba(46, 139, 87, 0.2)',
            'rgba(0, 150, 136, 0.25)',
            'rgba(30, 144, 255, 0.3)',
            'rgba(30, 80, 120, 0.35)',
            'rgba(45, 120, 160, 0.3)',
            'rgba(32, 110, 165, 0.3)',
            'rgba(30, 50, 160, 0.3)',
            'rgba(10, 30, 105, 0.3)',
            'rgba(0, 206, 209, 0.25)',
            'rgba(65, 105, 225, 0.2)'
        ];

        const numBlobs = 8 + Math.floor(Math.random() * 5);

        for (let i = 0; i < numBlobs; i++) {
            const blob = document.createElement('div');
            blob.className = 'blob';

            const size = 300 + Math.random() * 300;
            blob.style.width = size + 'px';
            blob.style.height = size + 'px';

            const xBias = 0.3 + Math.random() * 0.7;
            blob.style.left = (xBias * 100) + '%';
            blob.style.top = (Math.random() * 100) + '%';
            blob.style.transform = 'translate(-50%, -50%)';

            blob.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

            const fadeDuration  = 6  + Math.random() * 8;
            const floatDuration = 12 + Math.random() * 16;
            const fadeDelay     = Math.random() * 5;
            const floatDelay    = Math.random() * 5;

            blob.style.animation =
                'fade '  + fadeDuration  + 's ease-in-out ' + fadeDelay  + 's infinite, ' +
                'float ' + floatDuration + 's ease-in-out ' + floatDelay + 's infinite';

            document.body.appendChild(blob);
        }
    })();
</script>

</body>
</html>
