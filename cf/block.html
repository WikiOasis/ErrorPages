<!DOCTYPE html>
<html lang="en">
<head>

    <title id="page-title">403 • Blocked</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@500;600;700&display=swap" rel="stylesheet">

    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 48px 10%;
            background: #1a2532;
            color: #e8ecef;
            overflow: hidden;
            position: relative;
        }

        /* Decorative geometric cluster, bottom-right */
        .decor {
            position: fixed;
            right: 0;
            bottom: 0;
            width: min(440px, 42vw);
            height: auto;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            max-width: 620px;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 64px;
        }

        h1 {
            font-family: 'Noto Serif', serif;
            font-size: clamp(40px, 5.5vw, 60px);
            font-weight: 600;
            line-height: 1.08;
            letter-spacing: -0.5px;
            color: #e8ecef;
            max-width: 16ch;
        }

        .description {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 14px;
            max-width: 46ch;
        }

        .cf-error-wrap {
            margin-top: 40px;
            max-width: 480px;
        }

        .cf-error-box {
            padding: 18px 22px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Override CF's injected styles */
        .cf-error-box,
        .cf-error-box * {
            background: transparent !important;
            color: #e8ecef !important;
            font-family: 'Inter', sans-serif !important;
            border-color: transparent !important;
        }

        .cf-error-box h2 {
            font-size: 16px !important;
            font-weight: 600 !important;
            margin-bottom: 8px !important;
        }

        .cf-error-box p {
            font-size: 13px !important;
            color: rgba(255, 255, 255, 0.55) !important;
            margin-bottom: 10px !important;
            line-height: 1.5 !important;
        }

        .cf-error-box ul {
            padding-left: 18px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 4px !important;
        }

        .cf-error-box li {
            font-size: 12px !important;
            color: rgba(255, 255, 255, 0.45) !important;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 11px 28px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #ffffff;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            body {
                padding: 56px 24px 32px;
                align-items: flex-start;
            }

            .decor {
                width: min(360px, 75vw);
                opacity: 0.8;
            }

            .logo {
                margin-bottom: 40px;
            }
        }
    </style>
    <link rel="shortcut icon" href="https://cdn.wikioasis.org/metawiki/1/18/favicon.ico" />
</head>
<body>

<svg class="decor" viewBox="0 0 560 560" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">

        </linearGradient>
        <linearGradient id="gB" x1="0.15" y1="0" x2="0.85" y2="1">

    <path d="M280,420 L140,420 A140,140 0 0 1 280,280 Z" fill="url(#gB)"/>

<div class="container">
    <img class="logo" src="https://cdn.wikioasis.org/metawiki/3/38/WikiOasis_Logo.png" alt="WikiOasis Logo" />
    <h1 id="error-heading">Blocked</h1>
    <p class="description" id="error-description">Your connection seemed suspicious, your connection has been blocked.</p>
    <div class="cf-error-wrap">
        <div class="cf-error-box">
            Ray ID: ::RAY_ID::
        </div>
    </div>
    <div class="buttons">
        <a href="https://discord.gg/GrrTcsVC2x" class="btn">Discord</a>
        <a href="mailto:tech@wikioasis.org" class="btn">Contact us</a>
    </div>
</div>

</body>
</html>
